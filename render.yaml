services:
  - type: web
    name: ucc-code-connect
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: UCC CoDE Connect
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: DATABASE_URL
        fromDatabase:
          name: ucc-code-connect-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '*'
      - key: MYUCC_URL
        value: https://my.ucc.edu.gh/login
      - key: UCC_ELEARNING_URL
        value: https://elearning.ucc.edu.gh/
      - key: CODE_WEBSITE_URL
        value: https://code.ucc.edu.gh/

databases:
  - name: ucc-code-connect-db
    plan: starter
